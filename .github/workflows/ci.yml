name: Web App CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check text integrity
        run: python scripts/check_text_encoding.py

      - name: Run unit tests
        run: npm test

      - name: Run Astro check
        run: npm run check

      - name: Build app
        run: npm run build
