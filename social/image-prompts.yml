# social/image-prompts.yml
# ComfyUI 用画像生成プロンプト定義
#
# 【使い方】
# 1. comfyui_defaults の値を ComfyUI ノードに設定
# 2. 各エントリの positive / negative をそのまま CLIPTextEncode にコピペ
# 3. 生成後は output のパスに保存（投稿時に自動添付される）
#
# 【ノードマッピング】
#   checkpoint    → CheckpointLoaderSimple > ckpt_name
#   width/height  → EmptyLatentImage > width / height
#   steps         → KSampler > steps
#   cfg           → KSampler > cfg
#   sampler_name  → KSampler > sampler_name
#   scheduler     → KSampler > scheduler
#   denoise       → KSampler > denoise
#   positive      → CLIPTextEncode（上段・ポジティブ）
#   negative      → CLIPTextEncode（下段・ネガティブ）
#   seed          → KSampler > seed（-1 = ランダム）

# =============================================================
# ComfyUI 共通設定
# =============================================================

comfyui_defaults:
  checkpoint: "realisticVisionV60B1_v51VAE.safetensors"
  width: 1280
  height: 720
  steps: 28
  cfg: 7.0
  sampler_name: dpmpp_2m
  scheduler: karras
  denoise: 1.0
  batch_size: 4       # 一度に4枚生成して最良を選ぶ
  seed: -1            # -1 = ランダム

