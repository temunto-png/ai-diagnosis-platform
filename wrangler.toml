name = "satsu-tei"
compatibility_date = "2026-03-17"

# レート制限用 KV Namespace
# 初回セットアップ: npx wrangler kv namespace create RATE_LIMIT
# 取得した id をここに記入してから build & deploy すること
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "cc73aabffd6a4d8ebf0d91254e0178c9"

# 診断キャッシュ用 KV Namespace（任意・有効化すると同一画像の重複API呼び出しを削減）
# セットアップ手順:
#   1. npx wrangler kv namespace create DIAGNOSIS_CACHE
#   2. 取得した id を下記に記入してコメントアウトを外す
#   3. npm run build && npx wrangler deploy --config dist/server/wrangler.json
[[kv_namespaces]]
binding = "DIAGNOSIS_CACHE_KV"
id = "588c5a95d45245959b856b67105a5193"
